name = "vlog-control-room-report-worker"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# 毎週日曜 07:00 JST (22:00 UTC 土曜) に実行 — §9 週次KPI集計
[triggers]
crons = ["0 22 * * 6"]

[[d1_databases]]
binding = "DB"
database_name = "vlog-control-room-db"
database_id = "b70c6b73-979f-46d5-8fdf-a671d34f6742"

[[kv_namespaces]]
binding = "CACHE"
id = "3acc30fb49c94cca9c4a550b735ef64f"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "vlog-control-room-assets"
