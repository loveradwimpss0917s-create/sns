name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      # Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets.
      # `wrangler pages deploy` does not auto-create a missing project on this
      # wrangler version, so create it first (idempotent: `|| true` swallows
      # the "already exists" error on every run after the first).
      - name: Ensure Cloudflare Pages project exists
        working-directory: apps/web
        run: npx wrangler pages project create vlog-control-room --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Runs wrangler directly (not cloudflare/pages-action) so it reads
      # apps/web/wrangler.toml — that's where pages_build_output_dir and the
      # D1/KV/R2/AI bindings live. See docs/Deployment.md.
      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name vlog-control-room
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Regression guard: fail the deploy if the homepage doesn't actually
      # render (catches SSR crashes like the missing-binding / cross-island
      # QueryClient bugs that a build success alone won't surface).
      - name: Smoke test deployed site
        run: |
          sleep 5
          curl -sS -o body.html https://vlog-control-room.pages.dev/
          if ! grep -q "astro-island" body.html; then
            echo "::error::Homepage did not render any hydrated content — see body.html below"
            cat body.html
            exit 1
          fi
          echo "OK: homepage rendered $(wc -c < body.html) bytes with hydrated content"
          curl -sS -o /dev/null -w "API health check: %{http_code}\n" --fail https://vlog-control-room.pages.dev/api/health
