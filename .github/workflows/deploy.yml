name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      # Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets.
      # `wrangler pages deploy` does not auto-create a missing project on this
      # wrangler version, so create it first (idempotent: `|| true` swallows
      # the "already exists" error on every run after the first).
      - name: Ensure Cloudflare Pages project exists
        working-directory: apps/web
        run: npx wrangler pages project create vlog-control-room --production-branch main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Runs wrangler directly (not cloudflare/pages-action) so it reads
      # apps/web/wrangler.toml — that's where pages_build_output_dir and the
      # D1/KV/R2/AI bindings live. See docs/Deployment.md.
      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name vlog-control-room
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Debug aid: the GitHub runner can reach the public internet (this
      # sandbox's own network policy cannot), so print what the deployed URL
      # actually returns.
      - name: Smoke test deployed site
        run: |
          sleep 5
          echo "--- / ---"
          curl -sS -D - -o body.html https://vlog-control-room.pages.dev/ || true
          echo "--- body (first 3000 chars) ---"
          head -c 3000 body.html || true
          echo
          echo "--- /api/health ---"
          curl -sS -D - -o health.json https://vlog-control-room.pages.dev/api/health || true
          cat health.json || true
