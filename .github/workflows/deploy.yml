name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build

      # Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repo secrets.
      # Runs wrangler directly (not cloudflare/pages-action) so it reads
      # apps/web/wrangler.toml — that's where pages_build_output_dir and the
      # D1/KV/R2/AI bindings live. wrangler creates the Pages project on the
      # first run if it doesn't exist yet. See docs/Deployment.md.
      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        run: npx wrangler pages deploy dist --project-name vlog-control-room
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
